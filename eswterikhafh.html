<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Εσωτερική Αφή · Ο Ήρωας της Αναπνοής</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=DM+Sans:wght@400;500&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #050510;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'Fraunces', serif;
      color: #e8e4df;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      display: block;
    }

    /* UI Elements */
    .lang-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(20, 25, 35, 0.8);
      border-radius: 30px;
      border: 1px solid rgba(200, 180, 140, 0.3);
      display: flex;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .lang-btn {
      padding: 5px 15px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      background: transparent;
      border: none;
      color: rgba(232, 228, 223, 0.5);
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
    }

    .lang-btn.active {
      background: rgba(200, 180, 140, 0.2);
      color: #e8e4df;
    }

    .label {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 90%;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    .label.vis {
      opacity: 1;
    }

    .label .main {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0,0,0,0.3);
    }

    .label .sub {
      font-size: clamp(0.7rem, 1.4vw, 0.9rem);
      letter-spacing: 0.05em;
      color: rgba(232, 228, 223, 0.8);
      margin-top: 8px;
      font-style: italic;
      line-height: 1.5;
      background: rgba(10, 12, 18, 0.6);
      padding: 8px 18px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      display: inline-block;
      max-width: 700px;
    }

    .snum {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 10;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(232, 228, 223, 0.2);
      font-family: monospace;
    }

    .ptrack {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.03);
      z-index: 10;
    }

    .pbar {
      height: 100%;
      background: linear-gradient(90deg, rgba(160, 130, 90, 0.4), rgba(200, 180, 100, 0.6), rgba(120, 190, 170, 0.5));
      transition: width 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      width: 0%;
    }

    .dots {
      position: fixed;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(232, 228, 223, 0.12);
      transition: all 0.5s ease;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .dot.active {
      background: rgba(232, 228, 223, 0.7);
      transform: scale(1.6);
      box-shadow: 0 0 8px rgba(232, 228, 223, 0.3);
    }

    .ctrls {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 40px;
      border: 1px solid rgba(200, 180, 140, 0.2);
    }

    .ctrls button {
      background: rgba(232, 228, 223, 0.08);
      border: 1px solid rgba(232, 228, 223, 0.2);
      color: rgba(232, 228, 223, 0.7);
      padding: 6px 16px;
      font-family: 'Fraunces', serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 30px;
      transition: all 0.2s ease;
    }

    .ctrls button:active {
      background: rgba(232, 228, 223, 0.25);
      color: #fff;
      transform: scale(0.96);
    }

    /* Intro overlay */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 2s ease;
    }

    .intro.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .intro-t {
      font-size: clamp(1.6rem, 4.5vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #e8e4df, #c8a860);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: fi 2s ease 0.5s forwards;
    }

    .intro-s {
      font-size: clamp(0.7rem, 1.4vw, 0.95rem);
      letter-spacing: 0.3em;
      color: rgba(232, 228, 223, 0.25);
      margin-top: 8px;
      font-style: italic;
      opacity: 0;
      animation: fi 2s ease 1.2s forwards;
    }

    .intro-q {
      font-size: clamp(0.6rem, 1.1vw, 0.75rem);
      letter-spacing: 0.15em;
      color: rgba(232, 228, 223, 0.2);
      margin-top: 30px;
      max-width: 400px;
      text-align: center;
      line-height: 1.8;
      font-style: italic;
      opacity: 0;
      animation: fi 2s ease 1.8s forwards;
    }

    .intro-h {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: rgba(232, 228, 223, 0.1);
      margin-top: 40px;
      text-transform: uppercase;
      animation: pu 3.5s ease-in-out infinite;
    }

    @keyframes fi {
      to { opacity: 1; }
    }
    @keyframes pu {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
<div class="lang-toggle" id="langToggle">
  <button class="lang-btn active" data-lang="el">ΕΛ</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="intro" id="intro">
  <div class="intro-t" id="introTitle">Εσωτερική Αφή</div>
  <div class="intro-s" id="introSub">Η Πράξη της Παρατήρησης</div>
  <div class="intro-q" id="introQuote">«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»</div>
  <div class="intro-h" id="introHint">πάτησε για να ξεκινήσεις</div>
</div>
<canvas id="c"></canvas>
<div class="label" id="label">
  <div class="main" id="labelMain"></div>
  <div class="sub" id="labelSub"></div>
</div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots" id="dotsContainer"></div>
<div class="ctrls">
  <button id="prevBtn">◀</button>
  <button id="autoBtn">▶ auto</button>
  <button id="nextBtn">▶</button>
</div>

<script>
  (function(){
    // ========== ΧΡΩΜΑΤΙΚΗ ΠΑΛΕΤΑ ==========
    const B_COLORS = {
      '4-2-6-1': { primary: '#3A5E57', secondary: '#60857D', aura: '70, 130, 120' },
      '4-7-8':   { primary: '#2A4D69', secondary: '#4B86B4', aura: '100, 150, 190' },
      '5-5':     { primary: '#C5A059', secondary: '#E8C547', aura: '220, 190, 90' },
      'sleep-delta': { primary: '#4B2C5E', secondary: '#7F5283', aura: '120, 80, 150' },
      'sleep-classical': { primary: '#8B5E3C', secondary: '#B98B53', aura: '185, 140, 85' }
    };
    let currentAura = B_COLORS['4-2-6-1'].aura;
    
    // ========== ΠΛΗΡΗΣ ΜΟΡΦΗ ΗΡΩΑ (σταθερή, χωρίς κινούμενο ουράνιο τόξο) ==========
    function drawHero(ctx, x, y, alpha, tilt, headInflate, breathPhase, glowRegion, glowIntensity) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);
      
      const sc = 1.7;
      ctx.scale(sc, sc);
      const op = Math.min(1, alpha);
      const pColAura = currentAura;
      const time = performance.now() / 1000;
      const pulse = 0.5 + 0.5 * Math.sin(time * 1.5);
      const breathPulse = 0.5 + 0.5 * Math.sin(breathPhase * Math.PI * 2);
      
      const groundY = 0;
      const headY = -100;
      
      // Ατμοσφαιρικό φόντο
      const auraIntense = 0.08 + pulse * 0.05;
      const bgGrad = ctx.createRadialGradient(0, headY + 20, 0, 0, headY + 20, 250);
      bgGrad.addColorStop(0, `rgba(${pColAura}, ${auraIntense})`);
      bgGrad.addColorStop(0.6, `rgba(${pColAura}, 0.02)`);
      bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bgGrad;
      ctx.beginPath();
      ctx.arc(0, headY + 20, 250, 0, Math.PI*2);
      ctx.fill();
      
      // Ορίζοντας & Σκιά
      const horizonY = groundY + 56;
      ctx.fillStyle = `rgba(${pColAura}, 0.08)`;
      ctx.fillRect(-200, horizonY, 400, 24);
      ctx.strokeStyle = `rgba(${pColAura}, 0.06)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-180, horizonY);
      ctx.lineTo(180, horizonY);
      ctx.stroke();
      
      const shG = ctx.createRadialGradient(0, 45, 0, 0, 45, 70);
      shG.addColorStop(0, 'rgba(20,30,40,0.3)');
      shG.addColorStop(0.6, 'rgba(20,30,40,0.1)');
      shG.addColorStop(1, 'rgba(20,30,40,0)');
      ctx.fillStyle = shG;
      ctx.beginPath();
      ctx.ellipse(0, 45, 60 + pulse*5, 10 + pulse*2, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Άξονας βαρύτητας
      const axTop = -158, axBot = 78;
      const isFirstScene = (glowRegion === 0);
      if (isFirstScene) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = `rgba(${pColAura}, 0.5)`;
      }
      ctx.strokeStyle = `rgba(${pColAura}, ${isFirstScene ? 0.15 : 0.05})`;
      ctx.lineWidth = isFirstScene ? 28 : 22;
      ctx.beginPath();
      ctx.moveTo(0, axTop);
      ctx.lineTo(0, axBot);
      ctx.stroke();
      ctx.strokeStyle = `rgba(${pColAura}, ${isFirstScene ? 0.5 + pulse*0.2 : 0.2 + pulse*0.1})`;
      ctx.lineWidth = isFirstScene ? 3.5 : 2.2;
      ctx.beginPath();
      ctx.moveTo(0, axTop);
      ctx.lineTo(0, axBot);
      ctx.stroke();
      if (isFirstScene) {
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        ctx.strokeStyle = `rgba(255, 240, 200, ${0.3 + pulse*0.15})`;
        ctx.lineWidth = 1.0;
        ctx.beginPath();
        ctx.moveTo(0, axTop);
        ctx.lineTo(0, axBot);
        ctx.stroke();
      } else {
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
      }
      
      // Γήινη σφαίρα
      const gR = 44, gY = 0;
      const atmG = ctx.createRadialGradient(0, gY, gR, 0, gY, gR+10);
      atmG.addColorStop(0, `rgba(${pColAura}, 0.2)`);
      atmG.addColorStop(1, 'rgba(100,170,190,0)');
      ctx.fillStyle = atmG;
      ctx.beginPath();
      ctx.arc(0, gY, gR+10, 0, Math.PI*2);
      ctx.fill();
      
      const gg = ctx.createRadialGradient(-14, gY-12, 4, 0, gY+4, gR);
      gg.addColorStop(0, 'rgba(200,180,110,0.35)');
      gg.addColorStop(0.35, 'rgba(90,150,130,0.25)');
      gg.addColorStop(0.75, 'rgba(40,90,100,0.22)');
      gg.addColorStop(1, 'rgba(20,50,65,0.2)');
      ctx.fillStyle = gg;
      ctx.beginPath();
      ctx.arc(0, gY, gR, 0, Math.PI*2);
      ctx.fill();
      
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, gY, gR, 0, Math.PI*2);
      ctx.clip();
      const tGrad = ctx.createLinearGradient(-gR*0.2, 0, gR, 0);
      tGrad.addColorStop(0, 'rgba(10,20,35,0)');
      tGrad.addColorStop(1, 'rgba(10,20,35,0.3)');
      ctx.fillStyle = tGrad;
      ctx.fillRect(-gR, -gR, gR*2, gR*2);
      ctx.restore();
      
      ctx.fillStyle = 'rgba(180,150,70,0.1)';
      ctx.beginPath(); ctx.ellipse(-12, gY-5, 18, 12, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(15, gY+8, 10, 8, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-8, gY+16, 7, 4, 0.1, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,220,220,0.18)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0, gY, gR, -Math.PI*0.95, -Math.PI*0.35);
      ctx.stroke();
      
      // Πόδια Λωτού
      const sY = -gR+5, pY = sY-8;
      ctx.fillStyle = 'rgba(20,35,30,0.3)';
      ctx.beginPath();
      ctx.ellipse(0, sY+22, 32, 5, 0, 0, Math.PI*2);
      ctx.fill();
      const legG = ctx.createLinearGradient(0, sY-5, 0, sY+25);
      legG.addColorStop(0, 'rgba(55,80,70,0.9)');
      legG.addColorStop(1, 'rgba(35,55,48,0.9)');
      ctx.fillStyle = legG;
      ctx.beginPath();
      ctx.moveTo(-32, sY+5);
      ctx.quadraticCurveTo(-37, sY+18, -27, sY+24);
      ctx.quadraticCurveTo(-5, sY+27, 0, sY+15);
      ctx.quadraticCurveTo(5, sY+27, 27, sY+24);
      ctx.quadraticCurveTo(37, sY+18, 32, sY+5);
      ctx.quadraticCurveTo(16, sY-2, 0, pY);
      ctx.quadraticCurveTo(-16, sY-2, -32, sY+5);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,200,185,0.1)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-28, sY+8);
      ctx.quadraticCurveTo(0, sY-1, 28, sY+8);
      ctx.stroke();
      
      // Κορμός
      const wY = pY-22, cY = wY-28, shY = cY-12;
      const robeG = ctx.createLinearGradient(-26, shY, 26, pY);
      robeG.addColorStop(0, 'rgba(48,72,65,0.88)');
      robeG.addColorStop(0.5, 'rgba(68,95,82,0.88)');
      robeG.addColorStop(1, 'rgba(42,65,58,0.88)');
      ctx.fillStyle = robeG;
      ctx.beginPath();
      ctx.moveTo(-24, pY);
      ctx.quadraticCurveTo(-27, wY, -26, cY);
      ctx.lineTo(-22, shY);
      ctx.lineTo(22, shY);
      ctx.lineTo(26, cY);
      ctx.quadraticCurveTo(27, wY, 24, pY);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = 'rgba(20,35,28,0.22)';
      ctx.beginPath();
      ctx.moveTo(12, shY); ctx.lineTo(22, shY);
      ctx.lineTo(26, cY); ctx.quadraticCurveTo(27, wY, 24, pY);
      ctx.lineTo(14, pY); ctx.closePath();
      ctx.fill();
      
      ctx.strokeStyle = 'rgba(20,35,28,0.3)';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(0, shY+5);
      ctx.lineTo(0, pY);
      ctx.stroke();
      
      const chestExp = breathPulse * 0.8;
      ctx.fillStyle = `rgba(255,240,210,${chestExp*0.08})`;
      ctx.beginPath();
      ctx.ellipse(0, cY+2, 14 + chestExp*6, 8 + chestExp*4, 0, 0, Math.PI*2);
      ctx.fill();
      
      ctx.strokeStyle = 'rgba(220,190,140,0.35)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-20, shY+1);
      ctx.quadraticCurveTo(-4, shY+5, 0, shY+7);
      ctx.quadraticCurveTo(4, shY+5, 20, shY+1);
      ctx.stroke();
      
      // Χέρια (σταθερά mudra)
      for (let side = -1; side <= 1; side += 2) {
        const sx = side*22, sy = shY+3;
        const eX = sx + Math.cos(1.2)*side*21;
        const eY = sy + Math.sin(1.2)*30;
        const hx = eX + Math.cos(1.4)*side*16;
        const hy = eY + Math.sin(1.4)*18;
        const slG = ctx.createLinearGradient(sx, sy, eX, eY);
        slG.addColorStop(0, `rgba(58,85,75,0.72)`);
        slG.addColorStop(1, `rgba(45,68,60,0.72)`);
        ctx.fillStyle = slG;
        ctx.beginPath();
        ctx.moveTo(sx - side*5.5, sy);
        ctx.lineTo(sx + side*5.5, sy);
        ctx.lineTo(eX + side*4, eY);
        ctx.lineTo(eX - side*4, eY);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(40,60,52,0.5)';
        ctx.beginPath();
        ctx.arc(eX, eY, 4.2, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(210,180,130,0.65)';
        ctx.lineWidth = 3.8;
        ctx.beginPath();
        ctx.moveTo(eX, eY);
        ctx.lineTo(hx, hy);
        ctx.stroke();
        ctx.fillStyle = 'rgba(215,185,135,0.55)';
        ctx.beginPath();
        ctx.arc(hx, hy, 5, 0, Math.PI*2);
        ctx.fill();
      }
      
      // Mudra κέντρο
      const mY = wY+16;
      ctx.fillStyle = 'rgba(220,190,140,0.45)';
      ctx.beginPath();
      ctx.ellipse(0, mY, 10, 6, 0, 0, Math.PI*2);
      ctx.fill();
      
      // ΣΥΜΒΟΛΟ ΑΠΕΙΡΟΥ (σταθερό, χωρίς κίνηση)
      const iY = cY+9;
      ctx.save();
      ctx.translate(0, iY);
      ctx.lineWidth = 1.6;
      const colors = ['#E8704A', '#E8A030', '#C8C040', '#50B870', '#40A0A8', '#6070C0', '#9860A8'];
      for (let i = 0; i < colors.length; i++) {
        const offset = (i - 3) * 0.5;
        ctx.strokeStyle = colors[i];
        ctx.globalAlpha = 0.35;
        ctx.beginPath();
        ctx.moveTo(0, offset);
        ctx.bezierCurveTo(-9*1.3, -9+offset, -9*1.3, 9+offset, 0, offset);
        ctx.bezierCurveTo(9*1.3, -9+offset, 9*1.3, 9+offset, 0, offset);
        ctx.stroke();
      }
      ctx.restore();
      
      // Φωτοστέφανο
      const hdY = shY-9, hdR = 17;
      const haloG = ctx.createRadialGradient(0, hdY, 0, 0, hdY, hdR+22);
      haloG.addColorStop(0, `rgba(${pColAura}, 0.1)`);
      haloG.addColorStop(1, 'rgba(220,200,140,0)');
      ctx.fillStyle = haloG;
      ctx.beginPath();
      ctx.arc(0, hdY, hdR+22, 0, Math.PI*2);
      ctx.fill();
      
      // Κεφάλι
      ctx.fillStyle = 'rgba(210,180,130,0.78)';
      ctx.fillRect(-5.5, hdY-8, 11, 18);
      ctx.fillStyle = 'rgba(50,72,65,0.88)';
      ctx.beginPath();
      ctx.moveTo(-22, hdY+4);
      ctx.quadraticCurveTo(-24, hdY-8, -18, hdY-12);
      ctx.quadraticCurveTo(-10, hdY-22, 0, hdY-24);
      ctx.quadraticCurveTo(10, hdY-22, 18, hdY-12);
      ctx.quadraticCurveTo(24, hdY-8, 22, hdY+4);
      ctx.fill();
      ctx.fillStyle = 'rgba(230,200,155,0.78)';
      ctx.beginPath();
      ctx.arc(0, hdY-4, hdR-3, -0.3, Math.PI+0.3);
      ctx.fill();
      ctx.strokeStyle = 'rgba(60,40,25,0.55)';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-7, hdY-2);
      ctx.quadraticCurveTo(-4, hdY+0.5, 0, hdY-2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(7, hdY-2);
      ctx.quadraticCurveTo(4, hdY+0.5, 0, hdY-2);
      ctx.stroke();
      
      // Εσωτερική λάμψη αναπνοής
      if (glowRegion > 0 && glowIntensity > 0.05) {
        ctx.save();
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#b0e8c0';
        const glowAlpha = op * glowIntensity * 0.9;
        if (glowRegion === 1) {
          const grad = ctx.createRadialGradient(-2, hdY-6, 0, -2, hdY-6, 18);
          grad.addColorStop(0, `rgba(220, 255, 200, ${glowAlpha * breathPulse})`);
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(-2, hdY-6, 16, 0, Math.PI*2);
          ctx.fill();
        } else if (glowRegion === 2) {
          const grad = ctx.createRadialGradient(0, hdY+8, 0, 0, hdY+8, 26);
          grad.addColorStop(0, `rgba(190, 240, 200, ${glowAlpha * breathPulse})`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.ellipse(0, hdY+8, 20, 16, 0, 0, Math.PI*2);
          ctx.fill();
        } else if (glowRegion === 3) {
          const chestGrad = ctx.createRadialGradient(0, hdY+25, 0, 0, hdY+25, 30);
          chestGrad.addColorStop(0, `rgba(210, 250, 190, ${glowAlpha * breathPulse})`);
          ctx.fillStyle = chestGrad;
          ctx.beginPath();
          ctx.ellipse(0, hdY+25, 26, 22, 0, 0, Math.PI*2);
          ctx.fill();
        } else if (glowRegion >= 4) {
          const auraGrad = ctx.createRadialGradient(0, hdY+30, 10, 0, hdY+30, 110);
          auraGrad.addColorStop(0, `rgba(180, 240, 170, ${glowAlpha * breathPulse * 0.3})`);
          ctx.fillStyle = auraGrad;
          ctx.beginPath();
          ctx.ellipse(0, hdY+30, 90, 120, 0, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
      
      // Σωματίδια αναπνοής
      for (let i = 0; i < 6; i++) {
        const prog = ((time*0.7 + i*1.2) % 3) / 3;
        const px = Math.sin(time*0.7 + i*2.1) * (24 + i*3);
        const rising = breathPulse > 0.5;
        const py = rising ? cY - prog*80 : cY - 80 + prog*80;
        const pa = Math.sin(prog*Math.PI) * 0.35;
        ctx.fillStyle = rising ? `rgba(220,240,250,${pa})` : `rgba(255,225,175,${pa})`;
        ctx.beginPath();
        ctx.arc(px, py, 1.2 + Math.sin(prog*Math.PI)*0.8, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    
    // ========== ΚΥΡΙΟ ΠΡΟΓΡΑΜΜΑ ==========
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    let W, H, cx, cy;
    function resize(){
      const d = Math.min(devicePixelRatio||1, 2);
      W = innerWidth; H = innerHeight;
      cv.width = W * d; cv.height = H * d;
      cv.style.width = W + 'px'; cv.style.height = H + 'px';
      ctx.setTransform(d,0,0,d,0,0);
      cx = W/2; cy = H/2 + 20;
    }
    resize(); addEventListener('resize', resize);
    
    const scenes = [
      { label: { el: 'Βαρύτητα', en: 'Gravity' }, sub: { el: 'Νιώσε το βάρος σου να κατεβαίνει προς τη γη<br>Η σπονδυλική στήλη ευθυγραμμίζεται', en: 'Feel your weight sinking into the earth<br>The spine aligns naturally' }, bg: [18,22,20], tilt: 0.0, headInflate: 1.0, breathAmp: 0.4, glowRegion: 0, glowIntensity: 0.0 },
      { label: { el: 'Ρουθούνια', en: 'Nostrils' }, sub: { el: 'Ο αέρας αγγίζει τα ρουθούνια<br>Η πρώτη αίσθηση της αναπνοής', en: 'Air touches the nostrils<br>The first sensation of breath' }, bg: [22,25,28], tilt: 0.02, headInflate: 1.05, breathAmp: 0.7, glowRegion: 1, glowIntensity: 0.9 },
      { label: { el: 'Λαιμός', en: 'Throat' }, sub: { el: 'Ο αέρας περνά από το λαιμό<br>Παρατήρησε την κίνηση', en: 'Air passes through the throat<br>Notice the movement' }, bg: [20,30,32], tilt: 0.01, headInflate: 1.0, breathAmp: 0.8, glowRegion: 2, glowIntensity: 1.0 },
      { label: { el: 'Στήθος & Κοιλιά', en: 'Chest & Belly' }, sub: { el: 'Διαστολή και συστολή<br>Η κίνηση μέσα στο σώμα', en: 'Expansion and contraction<br>The movement inside the body' }, bg: [22,28,28], tilt: 0.0, headInflate: 1.0, breathAmp: 1.0, glowRegion: 3, glowIntensity: 1.2 },
      { label: { el: 'Ολόκληρο το Σώμα', en: 'Whole Body' }, sub: { el: 'Κάθε εισπνοή αλλάζει τη στάση<br>Εσωτερική αφή παντού', en: 'Every breath changes posture<br>Inner touch everywhere' }, bg: [20,32,25], tilt: 0.0, headInflate: 1.0, breathAmp: 1.2, glowRegion: 4, glowIntensity: 1.0 },
      { label: { el: 'Εκπνοή · Ένωση με τον χώρο', en: 'Exhale · Union with Space' }, sub: { el: 'Το ουράνιο τόξο της εκπνοής αγκαλιάζει τα πάντα<br>Ενώσου με το σύμπαν', en: 'The rainbow of exhale embraces everything<br>Merge with the cosmos' }, bg: [25,30,35], tilt: 0.0, headInflate: 1.0, breathAmp: 1.4, glowRegion: 4, glowIntensity: 1.4 }
    ];
    
    let lang = 'el';
    let cur = 0, tgt = 0, trans = false, tT = 0;
    let autoP = false, autoTm = null;
    let time = 0, gA = 0, breathTime = 0;
    
    // Γλώσσα
    const langBtns = document.querySelectorAll('.lang-btn');
    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        lang = btn.dataset.lang;
        updateSceneLabels(cur);
        updateIntro();
      });
    });
    
    function updateIntro(){
      const t = lang==='el' ? 'Εσωτερική Αφή' : 'Inner Touch';
      const s = lang==='el' ? 'Η Πράξη της Παρατήρησης' : 'The Act of Observation';
      const q = lang==='el' ? '«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»' : '"You do not need to control your breath.<br>Just observe it as it is."';
      const h = lang==='el' ? 'πάτησε για να ξεκινήσεις' : 'click to begin';
      document.getElementById('introTitle').textContent = t;
      document.getElementById('introSub').textContent = s;
      document.getElementById('introQuote').innerHTML = q;
      document.getElementById('introHint').textContent = h;
    }
    
    function updateSceneLabels(idx){
      const s = scenes[idx];
      document.getElementById('labelMain').textContent = s.label[lang];
      document.getElementById('labelSub').innerHTML = s.sub[lang];
      document.getElementById('label').classList.add('vis');
      document.getElementById('sn').textContent = `${idx+1} / ${scenes.length}`;
      document.getElementById('pb').style.width = `${(idx/(scenes.length-1))*100}%`;
      const dotsDiv = document.getElementById('dotsContainer');
      dotsDiv.innerHTML = '';
      for(let i=0; i<scenes.length; i++){
        const d = document.createElement('button');
        d.className = 'dot' + (i===idx ? ' active' : '');
        d.addEventListener('click', (function(sceneIdx){ return function(){ goTo(sceneIdx); }; })(i));
        dotsDiv.appendChild(d);
      }
      if (idx === 0) currentAura = B_COLORS['4-2-6-1'].aura;
      else if (idx === 1) currentAura = B_COLORS['4-7-8'].aura;
      else if (idx === 2) currentAura = B_COLORS['5-5'].aura;
      else if (idx === 3) currentAura = B_COLORS['sleep-delta'].aura;
      else if (idx === 4) currentAura = B_COLORS['sleep-classical'].aura;
      else if (idx === 5) currentAura = '180, 140, 220';
    }
    
    window.goTo = function(i){
      if(i<0 || i>=scenes.length || i===cur || trans) return;
      tgt = i; trans = true; tT = 0;
      document.getElementById('label').classList.remove('vis');
      if(autoP) {
        if(autoTm) clearTimeout(autoTm);
        runAuto();
      }
      setTimeout(() => { cur = tgt; trans = false; updateSceneLabels(cur); }, 1000);
    };
    
    function ease(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
    
    window.togAuto = function(){
      autoP = !autoP;
      const autoBtn = document.getElementById('autoBtn');
      autoBtn.innerHTML = autoP ? '⏸ pause' : '▶ auto';
      if(autoP) runAuto();
      else { if(autoTm) clearTimeout(autoTm); autoTm = null; }
    };
    
    function runAuto(){
      if(!autoP) return;
      if(autoTm) clearTimeout(autoTm);
      autoTm = setTimeout(() => {
        if(cur < scenes.length-1) { 
          goTo(cur+1); 
          runAuto(); 
        } else { 
          autoP = false; 
          document.getElementById('autoBtn').innerHTML = '▶ auto';
        }
      }, 5000);
    }
    
    // Σύνδεση κάτω κουμπιών
    document.getElementById('prevBtn').addEventListener('click', () => goTo(cur-1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(cur+1));
    document.getElementById('autoBtn').addEventListener('click', togAuto);
    
    // Σωματίδια φόντου
    const particles = [];
    for(let i=0; i<60; i++){
      particles.push({
        x: Math.random()*2000, y: Math.random()*2000,
        vx: (Math.random()-0.5)*0.05, vy: (Math.random()-0.5)*0.03,
        size: 0.3+Math.random()*1.0, alpha: 0.02+Math.random()*0.06,
        phase: Math.random()*Math.PI*2
      });
    }
    
    function drawBackground(sceneFactor){
      const idx = Math.floor(sceneFactor);
      const frac = sceneFactor - idx;
      const next = Math.min(idx+1, scenes.length-1);
      const bg0 = scenes[idx].bg, bg1 = scenes[next].bg;
      const r = bg0[0]*(1-frac) + bg1[0]*frac;
      const g = bg0[1]*(1-frac) + bg1[1]*frac;
      const b = bg0[2]*(1-frac) + bg1[2]*frac;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.75);
      grad.addColorStop(0, `rgb(${r|0}, ${g|0}, ${b|0})`);
      grad.addColorStop(1, '#050510');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      
      ctx.globalAlpha = gA * 0.5;
      particles.forEach(p => {
        p.x += p.vx + Math.sin(time*0.2 + p.phase)*0.01;
        p.y += p.vy + Math.cos(time*0.15 + p.phase)*0.01;
        if(p.x<0) p.x=W; if(p.x>W) p.x=0;
        if(p.y<0) p.y=H; if(p.y>H) p.y=0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200, 220, 190, ${p.alpha * (0.6+Math.sin(time*0.5+p.phase)*0.3)})`;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }
    
    // Στατικό ουράνιο τόξο πλήρους οθόνης για την εκπνοή
    function drawFullscreenRainbow() {
      const gradient = ctx.createLinearGradient(0, 0, W, 0);
      gradient.addColorStop(0, 'rgba(255, 0, 0, 0.25)');
      gradient.addColorStop(0.16, 'rgba(255, 165, 0, 0.25)');
      gradient.addColorStop(0.33, 'rgba(255, 255, 0, 0.25)');
      gradient.addColorStop(0.5, 'rgba(0, 128, 0, 0.25)');
      gradient.addColorStop(0.66, 'rgba(0, 0, 255, 0.25)');
      gradient.addColorStop(0.83, 'rgba(75, 0, 130, 0.25)');
      gradient.addColorStop(1, 'rgba(238, 130, 238, 0.25)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }
    
    function drawSceneAt(factor){
      const idx = Math.floor(factor);
      const frac = factor - idx;
      const s0 = scenes[idx];
      const s1 = scenes[Math.min(idx+1, scenes.length-1)];
      const tilt = s0.tilt*(1-frac) + s1.tilt*frac;
      const headInflate = s0.headInflate*(1-frac) + s1.headInflate*frac;
      const breathAmp = s0.breathAmp*(1-frac) + s1.breathAmp*frac;
      let glowRegion = s0.glowRegion;
      let glowIntensity = s0.glowIntensity*(1-frac) + s1.glowIntensity*frac;
      if (frac > 0.01 && s0.glowRegion !== s1.glowRegion) glowRegion = frac < 0.5 ? s0.glowRegion : s1.glowRegion;
      const breathPhase = breathTime * 0.95;
      const breathTilt = Math.sin(breathPhase * Math.PI * 2) * 0.007 * breathAmp;
      drawHero(ctx, cx, cy, gA, tilt + breathTilt, headInflate, breathPhase, glowRegion, glowIntensity);
      
      // ΣΤΑΤΙΚΟ ΟΥΡΑΝΙΟ ΤΟΞΟ ΣΤΗΝ ΕΚΠΝΟΗ (τελευταία σκηνή)
      // Ελέγχουμε αν η τρέχουσα σκηνή (ή μετάβαση προς αυτήν) είναι η 5η (index 5)
      const isExhaleScene = (idx === 5) || (trans && tgt === 5 && frac > 0.3);
      if (isExhaleScene || (cur === 5 && !trans)) {
        drawFullscreenRainbow();
      }
    }
    
    let lastTimestamp = 0;
    function loop(ts){
      const dt = Math.min((ts - lastTimestamp)/1000, 0.05);
      lastTimestamp = ts;
      time += dt;
      breathTime += dt * 1.05;  // πιο γρήγορος ρυθμός
      
      if(gA < 1) gA = Math.min(1, gA + dt*0.6);
      if(trans) tT = Math.min(tT + dt*0.75, 1);
      
      ctx.clearRect(0, 0, W, H);
      const sceneFactor = trans ? cur + (tgt - cur) * ease(tT) : cur;
      drawBackground(sceneFactor);
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#203020';
      drawSceneAt(sceneFactor);
      ctx.restore();
      requestAnimationFrame(loop);
    }
    
    document.getElementById('intro').addEventListener('click', () => {
      document.getElementById('intro').classList.add('hidden');
      updateIntro();
      updateSceneLabels(cur);
      requestAnimationFrame(loop);
    });
    
    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowRight' || e.key === ' ') goTo(cur+1);
      if(e.key === 'ArrowLeft') goTo(cur-1);
    });
    
    updateIntro();
    updateSceneLabels(0);
  })();
</script>
</body>
</html>
